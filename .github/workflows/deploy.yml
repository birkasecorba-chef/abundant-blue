name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t abundant-blue .

      - name: Save Docker image
        run: docker save abundant-blue | gzip > abundant-blue.tar.gz

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "abundant-blue.tar.gz"
          target: "/tmp"

      - name: Start container on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker load < /tmp/abundant-blue.tar.gz
            docker stop abundant-blue 2>/dev/null || true
            docker rm abundant-blue 2>/dev/null || true
            docker run -d --name abundant-blue --restart unless-stopped -p 3001:80 abundant-blue
            rm /tmp/abundant-blue.tar.gz
